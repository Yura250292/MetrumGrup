<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Офлайн — Metrum Group</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0B0F17 0%, #121826 100%);
      color: #F4F6FB;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    p {
      font-size: 1.125rem;
      color: #A8B3CC;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #3B5BFF;
      border: none;
      border-radius: 12px;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn:hover {
      background: #4D6AFF;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(59, 91, 255, 0.4);
    }

    .btn:active {
      transform: scale(0.97);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.75rem;
      }
      p {
        font-size: 1rem;
      }
      .icon {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Ви офлайн</h1>
    <p>Перевірте з'єднання з інтернетом та спробуйте ще раз.</p>
    <a href="/" class="btn" onclick="window.location.reload()">Спробувати знову</a>
  </div>
</body>
</html>
